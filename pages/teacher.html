<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأستاذ | المعهد العلمي</title>
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .section-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <aside id="sidebar" class="fixed inset-y-0 right-0 z-50 w-64 bg-white border-l border-gray-200 shadow-2xl transform translate-x-full transition-transform duration-300 md:translate-x-0 md:static md:flex md:flex-col h-full">
        <div class="p-6 text-center border-b border-gray-100 relative">
            <button onclick="window.toggleSidebar()" class="md:hidden absolute top-4 right-4 text-3xl font-bold">&times;</button>
            <div class="text-4xl mb-2">👨‍🏫</div>
            <h2 class="text-xl font-bold text-blue-900">بوابة الأستاذ</h2>
            <button onclick="window.openModal('changePassModal')" class="mt-2 text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full">🔑 تغيير المرور</button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="window.showSection('attendance')" class="w-full text-right px-4 py-3 bg-blue-50 text-blue-900 font-bold rounded-lg">✅ سجل الحضور</button>
            <button onclick="window.showSection('journals')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-bold text-orange-700">📔 دفتر النصوص</button>
            <button onclick="window.showSection('assignments')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">📝 التكليفات المعتادة</button>
            <button onclick="window.showSection('quizzes')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg text-purple-700 font-bold">⏱️ الاختبارات الرقمية</button>
            <button onclick="window.showSection('documents')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-bold text-teal-600">📁 الجذاذات</button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden w-full">
        <header class="bg-white shadow-sm border-b px-4 md:px-8 py-4 flex justify-between items-center z-40">
            <div class="flex items-center gap-4">
                <button onclick="window.toggleSidebar()" class="md:hidden text-3xl text-blue-900">☰</button>
                <h2 class="text-lg md:text-xl font-bold text-blue-900" id="topNavWelcome">مرحبا بالأستاذ الكريم</h2>
            </div>
            <button onclick="window.logout()" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold px-3 py-2 rounded-lg border border-red-200 text-sm">تسجيل الخروج</button>
        </header>

        <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            <div id="section-attendance" class="section-content section-active"><h1 class="text-2xl font-bold mb-6">سجل الغياب</h1><div class="bg-white rounded-xl shadow-sm border p-6"><div class="flex flex-col md:flex-row gap-4 mb-4"><input type="date" id="attendanceDate" class="border rounded-lg px-3 py-2 flex-1"><select id="attendanceSubject" class="border rounded-lg px-3 py-2 flex-1 teacher-subjects-dropdown"></select></div><div class="overflow-x-auto"><table class="w-full text-right whitespace-nowrap"><thead class="bg-gray-50"><tr><th class="p-4">الطالب</th><th class="p-4 text-center">الوضعية</th></tr></thead><tbody id="attendanceTableBody"></tbody></table></div><button id="saveAttendanceBtn" class="mt-4 bg-green-500 text-white px-6 py-2 rounded-lg font-bold w-full md:w-auto">حفظ السجل</button></div></div>
            <div id="section-journals" class="section-content"><div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold text-orange-700">دفتر النصوص</h1><button onclick="window.openModal('addJournalModal')" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-bold">+ تدوين حصة</button></div><div id="journalsList" class="grid grid-cols-1 gap-4"></div></div>
            <div id="section-assignments" class="section-content"><div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold">التكليفات</h1><button onclick="window.openModal('addAssignmentModal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ تكليف جديد</button></div><div id="assignmentsList" class="grid grid-cols-1 gap-4"></div></div>
            <div id="section-quizzes" class="section-content"><div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold text-purple-700">الاختبارات</h1><button onclick="window.openModal('addQuizModal')" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-bold">+ إنشاء اختبار</button></div><div id="quizzesList" class="grid grid-cols-1 gap-4"></div></div>
            <div id="section-documents" class="section-content"><div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold">الوثائق</h1><button onclick="window.openModal('addDocumentModal')" class="bg-teal-600 text-white px-4 py-2 rounded-lg font-bold">+ رفع وثيقة</button></div><div id="documentsList" class="grid grid-cols-1 gap-4"></div></div>
        </main>
    </div>

    <div id="changePassModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-sm p-6"><form id="changePassForm"><input type="password" id="newPass" required class="w-full px-4 py-2 rounded-lg border mb-6" placeholder="المرور الجديدة"><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('changePassModal')" class="px-5 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded-lg">حفظ</button></div></form></div></div>
    <div id="addJournalModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-md p-6"><form id="addJournalForm"><input type="date" id="journalDate" required class="w-full px-4 py-2 border rounded-lg mb-4"><select id="journalSubject" required class="w-full px-4 py-2 border rounded-lg mb-4 teacher-subjects-dropdown"></select><textarea id="journalContent" required class="w-full px-4 py-2 border rounded-lg mb-6" rows="4" placeholder="محتوى الحصة..."></textarea><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addJournalModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="submit" class="px-4 py-2 bg-orange-600 text-white rounded-lg">حفظ</button></div></form></div></div>
    
    <div id="addQuizModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl w-full max-w-3xl p-6 max-h-[95vh] flex flex-col">
            <h2 class="text-2xl font-bold text-purple-700 mb-4">بناء اختبار</h2>
            <div class="mb-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="quizTitle" required class="px-4 py-2 border rounded-lg" placeholder="العنوان">
                <select id="quizSubject" required class="px-4 py-2 border rounded-lg teacher-subjects-dropdown"></select>
                <select id="quizCount" class="px-4 py-2 border rounded-lg font-bold" onchange="window.generateQuizForms()"><option value="0">عدد الأسئلة</option><option value="5">5 أسئلة</option><option value="10">10 أسئلة</option><option value="20">20 سؤال</option></select>
                <div>
                    <label class="block text-xs font-bold text-red-600 mb-1">آخر موعد للإنجاز (القفل الآلي):</label>
                    <input type="datetime-local" id="quizDeadline" required class="w-full px-4 py-2 border rounded-lg focus:ring-red-500 text-sm">
                </div>
            </div>
            <form id="addQuizForm" class="overflow-y-auto flex-1 space-y-4"><div id="questionsContainer" class="text-center py-10">اختر عدد الأسئلة...</div></form>
            <div class="flex justify-end gap-3 mt-4 pt-4 border-t"><button type="button" onclick="window.closeModal('addQuizModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="button" onclick="window.saveQuiz()" id="saveQuizBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hidden">نشر</button></div>
        </div>
    </div>

    <div id="quizResultsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-2xl p-6 max-h-[90vh] flex flex-col"><h2 class="text-2xl font-bold text-purple-700 mb-5" id="resultsModalTitle">النتائج</h2><div class="overflow-y-auto flex-1"><table class="w-full text-right border whitespace-nowrap"><thead class="bg-purple-50"><tr><th class="p-3">الطالب</th><th class="p-3">النقطة</th><th class="p-3">إجراء</th></tr></thead><tbody id="quizResultsBody"></tbody></table></div><div class="mt-4"><button onclick="window.closeModal('quizResultsModal')" class="px-5 py-2 bg-gray-200 rounded-lg">إغلاق</button></div></div></div>
    <div id="addAssignmentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-md p-6"><form id="addAssignmentForm"><select id="assSubject" required class="w-full px-4 py-2 border rounded-lg mb-4 teacher-subjects-dropdown"></select><input type="text" id="assTitle" required class="w-full px-4 py-2 border rounded-lg mb-4" placeholder="العنوان"><textarea id="assDesc" required class="w-full px-4 py-2 border rounded-lg mb-6" placeholder="المطلوب..."></textarea><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addAssignmentModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">إرسال</button></div></form></div></div>
    <div id="addDocumentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-md p-6"><form id="addDocumentForm"><select id="docSubject" required class="w-full px-4 py-2 border rounded-lg mb-4 teacher-subjects-dropdown"></select><input type="text" id="docTitle" required class="w-full px-4 py-2 border rounded-lg mb-4" placeholder="العنوان"><textarea id="docDesc" required class="w-full px-4 py-2 border rounded-lg mb-4" placeholder="وصف..."></textarea><input type="url" id="docLink" required class="w-full px-4 py-2 border rounded-lg mb-6" placeholder="الرابط" dir="ltr"><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addDocumentModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="submit" class="px-4 py-2 bg-teal-600 text-white rounded-lg">مشاركة</button></div></form></div></div>

    <script type="module" src="../js/teacher.js"></script>
</body>
</html>
