<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأستاذ | المعهد العلمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .section-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col md:flex-row h-screen overflow-hidden text-gray-800 relative">

    <div class="md:hidden bg-white text-blue-900 p-4 flex justify-between items-center shadow-md z-20 border-b border-gray-200">
        <h2 class="text-xl font-bold" id="mobileTeacherName">بوابة الأستاذ</h2>
        <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="text-3xl focus:outline-none">☰</button>
    </div>

    <aside id="sidebar" class="w-64 bg-white border-l border-gray-200 flex flex-col hidden md:flex absolute md:relative h-full z-50 shadow-xl md:shadow-sm transition-all">
        <div class="p-6 text-center border-b border-gray-100 relative">
            <button onclick="document.getElementById('sidebar').classList.add('hidden')" class="md:hidden absolute top-4 right-4 text-2xl text-red-500 font-bold">×</button>
            <div class="text-4xl mb-2">👨‍🏫</div>
            <h2 class="text-xl font-bold text-blue-900" id="teacherNameDisplay">بوابة الأستاذ</h2>
            <button onclick="window.openModal('changePassModal')" class="mt-2 text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded-full transition-colors">🔑 تغيير المرور</button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="window.showSection('attendance')" class="w-full text-right px-4 py-3 bg-blue-50 text-blue-900 font-bold rounded-lg transition-colors">✅ سجل الحضور</button>
            <button onclick="window.showSection('journals')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors font-bold text-orange-700">📔 دفتر النصوص</button>
            <button onclick="window.showSection('assignments')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">📝 التكليفات العادية</button>
            <button onclick="window.showSection('quizzes')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors text-purple-700 font-bold">⏱️ الاختبارات الرقمية</button>
            <button onclick="window.showSection('documents')" class="w-full text-right px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors font-bold text-teal-600">📁 الجذاذات</button>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button onclick="window.logout()" class="block w-full text-center px-4 py-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-semibold">تسجيل الخروج</button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-10 overflow-y-auto">
        <div id="section-attendance" class="section-content section-active">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">سجل الغياب</h1>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 overflow-x-auto">
                <input type="date" id="attendanceDate" class="mb-4 border border-gray-300 rounded-lg px-3 py-2 font-bold text-gray-700">
                <table class="w-full text-right whitespace-nowrap"><thead class="bg-gray-50 text-gray-600"><tr><th class="p-4">اسم الطالب</th><th class="p-4 text-center">الوضعية</th></tr></thead><tbody id="attendanceTableBody"></tbody></table>
                <button id="saveAttendanceBtn" class="mt-4 px-6 py-2 bg-green-500 text-white font-bold rounded-lg shadow">حفظ السجل</button>
            </div>
        </div>

        <div id="section-journals" class="section-content">
            <div class="flex justify-between items-center mb-6"><h1 class="text-2xl md:text-3xl font-bold text-gray-800 text-orange-700">دفتر النصوص</h1><button onclick="window.openModal('addJournalModal')" class="bg-orange-600 text-white px-4 py-2 rounded-lg shadow">+ تدوين حصة</button></div>
            <div id="journalsList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="section-assignments" class="section-content">
            <div class="flex justify-between items-center mb-6"><h1 class="text-2xl md:text-3xl font-bold text-gray-800">التكليفات والتقييم</h1><button onclick="window.openModal('addAssignmentModal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow">+ تكليف جديد</button></div>
            <div id="assignmentsList" class="grid grid-cols-1 gap-4"></div>
        </div>
        <div id="section-quizzes" class="section-content">
            <div class="flex justify-between items-center mb-6"><h1 class="text-2xl md:text-3xl font-bold text-gray-800">الاختبارات الرقمية</h1><button onclick="window.openModal('addQuizModal')" class="bg-purple-600 text-white px-4 py-2 rounded-lg shadow">+ إنشاء اختبار</button></div>
            <div id="quizzesList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        <div id="section-documents" class="section-content">
            <div class="flex justify-between items-center mb-6"><h1 class="text-2xl md:text-3xl font-bold text-gray-800">الوثائق والجذاذات</h1><button onclick="window.openModal('addDocumentModal')" class="bg-teal-600 text-white px-4 py-2 rounded-lg shadow">+ رفع وثيقة</button></div>
            <div id="documentsList" class="grid grid-cols-1 gap-4"></div>
        </div>
    </main>

    <div id="changePassModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-sm p-6"><h2 class="text-2xl font-bold text-gray-800 mb-5">تغيير المرور</h2><form id="changePassForm"><input type="password" id="newPass" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 mb-6" placeholder="كلمة المرور الجديدة" dir="ltr"><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('changePassModal')" class="px-5 py-2 bg-gray-200 font-bold rounded-lg">إلغاء</button><button type="submit" class="px-5 py-2 bg-blue-600 text-white font-bold rounded-lg">حفظ</button></div></form></div></div>
    
    <div id="addJournalModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h2 class="text-2xl font-bold text-orange-700 mb-5">ملء دفتر النصوص</h2>
            <form id="addJournalForm">
                <div class="mb-4"><input type="date" id="journalDate" required class="w-full px-4 py-2 border rounded-lg"></div>
                <div class="mb-4"><label class="block text-sm font-bold mb-1">المادة المدرسة:</label><select id="journalSubject" required class="w-full px-4 py-2 border rounded-lg text-gray-700 teacher-subjects-dropdown"></select></div>
                <div class="mb-6"><textarea id="journalContent" required class="w-full px-4 py-2 border rounded-lg" rows="4" placeholder="محتوى الحصة (ما تم إنجازه)..."></textarea></div>
                <div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addJournalModal')" class="px-4 py-2 bg-gray-200 rounded-lg font-bold">إلغاء</button><button type="submit" class="px-4 py-2 bg-orange-600 text-white rounded-lg font-bold">حفظ في الدفتر</button></div>
            </form>
        </div>
    </div>

    <div id="addQuizModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl w-full max-w-3xl p-6 shadow-2xl max-h-[95vh] flex flex-col">
            <h2 class="text-2xl font-bold text-purple-700 mb-4">بناء اختبار رقمي</h2>
            <div class="mb-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="quizTitle" required class="px-4 py-2 border rounded-lg" placeholder="عنوان الاختبار">
                <select id="quizSubject" required class="px-4 py-2 border rounded-lg teacher-subjects-dropdown"></select>
                <select id="quizCount" class="px-4 py-2 border rounded-lg font-bold" onchange="window.generateQuizForms()"><option value="0">عدد الأسئلة</option><option value="5">5 أسئلة (5 نقط)</option><option value="10">10 أسئلة (10 نقط)</option></select>
            </div>
            <form id="addQuizForm" class="overflow-y-auto flex-1 pr-2 space-y-4"><div id="questionsContainer" class="text-center text-gray-500 py-10">اختر عدد الأسئلة للبدء...</div></form>
            <div class="flex justify-end gap-3 mt-4 pt-4 border-t"><button type="button" onclick="window.closeModal('addQuizModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="button" onclick="window.saveQuiz()" id="saveQuizBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hidden">نشر الاختبار</button></div>
        </div>
    </div>

    <div id="quizResultsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-2xl max-h-[90vh] flex flex-col">
            <h2 class="text-2xl font-bold text-purple-700 mb-5" id="resultsModalTitle">النتائج</h2>
            <div class="overflow-y-auto flex-1 overflow-x-auto"><table class="w-full text-right border whitespace-nowrap"><thead class="bg-purple-50"><tr><th class="p-3">اسم الطالب</th><th class="p-3">النقطة</th><th class="p-3">التاريخ</th></tr></thead><tbody id="quizResultsBody"></tbody></table></div>
            <div class="mt-4 text-left"><button onclick="window.closeModal('quizResultsModal')" class="px-5 py-2 bg-gray-200 font-bold rounded-lg">إغلاق</button></div>
        </div>
    </div>

    <div id="addAssignmentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-md p-6"><form id="addAssignmentForm"><select id="assSubject" required class="w-full px-4 py-2 border rounded-lg mb-4 teacher-subjects-dropdown"></select><input type="text" id="assTitle" required class="w-full px-4 py-2 border rounded-lg mb-4" placeholder="العنوان"><textarea id="assDesc" required class="w-full px-4 py-2 border rounded-lg mb-6" placeholder="المطلوب..."></textarea><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addAssignmentModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">إرسال</button></div></form></div></div>
    <div id="addDocumentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4"><div class="bg-white rounded-2xl w-full max-w-md p-6"><form id="addDocumentForm"><select id="docSubject" required class="w-full px-4 py-2 border rounded-lg mb-4 teacher-subjects-dropdown"></select><input type="text" id="docTitle" required class="w-full px-4 py-2 border rounded-lg mb-4" placeholder="عنوان الوثيقة"><textarea id="docDesc" class="w-full px-4 py-2 border rounded-lg mb-4" placeholder="وصف..."></textarea><input type="url" id="docLink" required class="w-full px-4 py-2 border rounded-lg mb-6" placeholder="رابط الملف" dir="ltr"><div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addDocumentModal')" class="px-4 py-2 bg-gray-200 rounded-lg">إلغاء</button><button type="submit" class="px-4 py-2 bg-teal-600 text-white rounded-lg">مشاركة</button></div></form></div></div>

    <script type="module" src="../js/teacher.js"></script>
</body>
</html>
