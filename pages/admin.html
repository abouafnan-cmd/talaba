<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | المعهد العلمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#1e3a8a', secondary: '#10b981' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800 relative">

    <aside class="w-64 bg-primary text-white flex flex-col hidden md:flex z-10">
        <div class="p-6 text-center border-b border-blue-800">
            <h2 class="text-2xl font-bold">إدارة المعهد</h2>
            <p class="text-blue-300 text-sm mt-1">نظام المدير العام</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="#" class="block px-4 py-3 bg-blue-800 rounded-lg transition-colors hover:bg-blue-700">📊 الإحصائيات العامة</a>
            <a href="#" class="block px-4 py-3 rounded-lg transition-colors hover:bg-blue-800">👥 إدارة الطلبة والأفواج</a>
            <a href="#" class="block px-4 py-3 rounded-lg transition-colors hover:bg-blue-800">👨‍🏫 إدارة الأساتذة</a>
            <a href="#" class="block px-4 py-3 rounded-lg transition-colors hover:bg-blue-800">📚 المواد الدراسية</a>
            <a href="#" class="block px-4 py-3 rounded-lg transition-colors hover:bg-blue-800">📢 الإخبارات والمواعيد</a>
            <a href="#" class="block px-4 py-3 rounded-lg transition-colors hover:bg-green-600 mt-4 bg-green-700 text-center">💬 إرسال واتساب</a>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <a href="../index.html" class="block w-full text-center px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg transition-colors text-white">تسجيل الخروج</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <div class="p-6 md:p-10">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">نظرة عامة</h1>
                <button id="quickAddBtn" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow transition-colors">+ إضافة سريعة</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">إجمالي الطلبة</p>
                        <p id="studentsCount" class="text-3xl font-bold text-primary">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl">👥</div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-800">الأشخاص المضافون مؤخراً</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead class="bg-gray-50 text-gray-500 text-sm">
                            <tr>
                                <th class="p-4">الاسم</th>
                                <th class="p-4">البريد الإلكتروني</th>
                                <th class="p-4">الصفة</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="text-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl transform transition-all">
            <h2 class="text-2xl font-bold text-primary mb-5">إضافة مستخدم جديد</h2>
            <form id="addUserForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">الاسم الكامل</label>
                    <input type="text" id="newName" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="مثال: أحمد محمود">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">البريد الإلكتروني</label>
                    <input type="email" id="newEmail" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="email@example.com" dir="ltr">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">صفة المستخدم</label>
                    <select id="newRole" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="طالب">طالب</option>
                        <option value="أستاذ">أستاذ</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="window.closeModal()" class="px-5 py-2 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition-colors">إلغاء</button>
                    <button type="submit" id="saveBtn" class="px-5 py-2 bg-secondary text-white font-bold rounded-lg hover:bg-green-600 transition-colors">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
