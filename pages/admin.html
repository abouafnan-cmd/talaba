<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | المعهد العلمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#1e3a8a', secondary: '#10b981' }
                }
            }
        }
    </script>
    <style>
        .section-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .section-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800 relative">

    <aside class="w-64 bg-primary text-white flex flex-col hidden md:flex z-10 shadow-xl">
        <div class="p-6 text-center border-b border-blue-800">
            <h2 class="text-2xl font-bold">إدارة المعهد</h2>
            <p class="text-blue-300 text-sm mt-1">نظام المدير العام</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="window.showSection('users')" class="w-full text-right px-4 py-3 bg-blue-800 rounded-lg transition-colors hover:bg-blue-700">👥 المستخدمون</button>
            <button onclick="window.showSection('cohorts')" class="w-full text-right px-4 py-3 rounded-lg transition-colors hover:bg-blue-800">🏫 إدارة الأفواج</button>
            <button onclick="window.showSection('subjects')" class="w-full text-right px-4 py-3 rounded-lg transition-colors hover:bg-blue-800">📚 المواد الدراسية</button>
            <button onclick="window.showSection('announcements')" class="w-full text-right px-4 py-3 rounded-lg transition-colors hover:bg-blue-800 text-yellow-300">📢 الإخبارات والمواعيد</button>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <a href="../index.html" class="block w-full text-center px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg transition-colors text-white">تسجيل الخروج</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto p-6 md:p-10">
        
        <div id="section-users" class="section-content section-active">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">المستخدمون</h1>
                <button onclick="window.openModal('addUserModal')" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow">+ إضافة مستخدم</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 text-gray-500 text-sm">
                        <tr>
                            <th class="p-4">الاسم</th>
                            <th class="p-4">الصفة</th>
                            <th class="p-4">رقم الهاتف</th>
                            <th class="p-4 text-center">كلمة المرور</th>
                            <th class="p-4 text-center">تواصل سريع</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="section-cohorts" class="section-content">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">إدارة الأفواج</h1>
                <button onclick="window.openModal('addCohortModal')" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow">+ إضافة فوج</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 text-gray-500 text-sm"><tr><th class="p-4">اسم الفوج / القسم</th></tr></thead>
                    <tbody id="cohortsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="section-subjects" class="section-content">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">المواد الدراسية</h1>
                <button onclick="window.openModal('addSubjectModal')" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow">+ إضافة مادة وإسنادها</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 text-gray-500 text-sm">
                        <tr>
                            <th class="p-4">المادة</th>
                            <th class="p-4">أستاذ المادة</th>
                            <th class="p-4">الفوج</th>
                            <th class="p-4">التفاصيل</th>
                        </tr>
                    </thead>
                    <tbody id="subjectsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="section-announcements" class="section-content">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">📢 الإخبارات والمواعيد</h1>
                <button onclick="window.openModal('addAnnouncementModal')" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-4 py-2 rounded-lg shadow">+ إنشاء جديد</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="announcementsList">
                </div>
        </div>

    </main>

    <div id="addUserModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-2xl font-bold text-primary mb-5">إضافة مستخدم</h2>
            <form id="addUserForm">
                <div class="mb-4">
                    <input type="text" id="newName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary" placeholder="الاسم الكامل">
                </div>
                <div class="mb-4">
                    <input type="tel" id="newPhone" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary" placeholder="رقم الهاتف (مثال: 0600000000)" dir="ltr">
                </div>
                <div class="mb-4">
                    <input type="text" id="newPassword" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary" placeholder="كلمة المرور الأولية (مثال: 123456)" dir="ltr">
                </div>
                <div class="mb-6">
                    <select id="newRole" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary">
                        <option value="طالب">طالب</option>
                        <option value="أستاذ">أستاذ</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="window.closeModal('addUserModal')" class="px-5 py-2 bg-gray-200 font-bold rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" class="px-5 py-2 bg-secondary text-white font-bold rounded-lg hover:bg-green-600">حفظ</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="addCohortModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-2xl font-bold text-primary mb-5">إضافة فوج جديد</h2>
            <form id="addCohortForm">
                <div class="mb-6"><input type="text" id="newCohortName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary" placeholder="اسم الفوج (مثال: طلبة الفصل الأول)"></div>
                <div class="flex justify-end gap-3"><button type="button" onclick="window.closeModal('addCohortModal')" class="px-5 py-2 bg-gray-200 font-bold rounded-lg hover:bg-gray-300">إلغاء</button><button type="submit" class="px-5 py-2 bg-secondary text-white font-bold rounded-lg hover:bg-green-600">حفظ</button></div>
            </form>
        </div>
    </div>

    <div id="addSubjectModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-bold text-primary mb-5">إضافة مادة دراسية</h2>
            <form id="addSubjectForm">
                <div class="mb-4"><input type="text" id="newSubjectName" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary" placeholder="اسم المادة (مثال: شرح الكافية الشافية)"></div>
                
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-1">معلومات عن المادة:</label>
                    <textarea id="subjectInfo" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary" rows="2" placeholder="وصف موجز للمادة..."></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-1">المقرر المقترح:</label>
                    <textarea id="subjectSyllabus" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary" rows="2" placeholder="أبواب المقرر..."></textarea>
                </div>
                
                <div class="mb-4"><label class="block text-sm font-semibold mb-1">إسناد لأستاذ:</label><select id="selectTeacher" required class="w-full px-4 py-2 rounded-lg border"></select></div>
                <div class="mb-6"><label class="block text-sm font-semibold mb-1">تخصيص لفوج:</label><select id="selectCohort" required class="w-full px-4 py-2 rounded-lg border"></select></div>
                
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="window.closeModal('addSubjectModal')" class="px-5 py-2 bg-gray-200 font-bold rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" class="px-5 py-2 bg-secondary text-white font-bold rounded-lg hover:bg-green-600">حفظ المادة</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addAnnouncementModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl max-h-[90vh] flex flex-col">
            <h2 class="text-2xl font-bold text-primary mb-4">إضافة إخبار أو موعد</h2>
            <form id="addAnnouncementForm" class="overflow-y-auto flex-1 pr-2">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-1">النوع:</label>
                    <select id="annType" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary" onchange="window.toggleDateInput()">
                        <option value="إخبار">📢 إخبار</option>
                        <option value="موعد">🗓️ موعد</option>
                    </select>
                </div>

                <div id="dateContainer" class="mb-4 hidden">
                    <label class="block text-sm font-semibold mb-1">تاريخ ووقت الموعد:</label>
                    <input type="datetime-local" id="annDate" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-1">الفئة المستهدفة:</label>
                    <select id="annTarget" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary" onchange="window.toggleTargetList()">
                        <option value="all">الطلبة والأساتذة معاً</option>
                        <option value="teachers">للأساتذة فقط (تخصيص)</option>
                        <option value="students">للطلبة فقط (تخصيص)</option>
                    </select>
                </div>

                <div id="targetListContainer" class="mb-4 hidden bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <div id="targetCheckboxes" class="max-h-32 overflow-y-auto">
                        </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-1">المحتوى:</label>
                    <textarea id="annContent" required class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-primary" rows="4" placeholder="اكتب نص الإخبار أو تفاصيل الموعد هنا..."></textarea>
                </div>

                <div class="flex justify-end gap-3 mt-4">
                    <button type="button" onclick="window.closeModal('addAnnouncementModal')" class="px-5 py-2 bg-gray-200 font-bold rounded-lg hover:bg-gray-300">إلغاء</button>
                    <button type="submit" id="saveAnnBtn" class="px-5 py-2 bg-secondary text-white font-bold rounded-lg hover:bg-green-600">نشر</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
