<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير الحضور والغياب</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .report-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: linear-gradient(135deg, #4a6fa5, #6b8cbc);
            color: white;
            border-radius: 10px;
        }
        
        .report-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .summary-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .summary-card.present {
            border-top: 4px solid #28a745;
        }
        
        .summary-card.absent {
            border-top: 4px solid #dc3545;
        }
        
        .summary-card.total {
            border-top: 4px solid #4a6fa5;
        }
        
        .student-list {
            margin-top: 2rem;
        }
        
        @media print {
            .report-actions {
                display: none;
            }
            
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="report-header">
            <h1><i class="fas fa-chart-bar"></i> تقرير الحضور والغياب</h1>
            <p id="report-date">التاريخ: ...</p>
            <p id="report-info">القسم: ... | المادة: ...</p>
        </div>

        <div class="report-actions">
            <button class="btn btn-primary" onclick="window.print()">
                <i class="fas fa-print"></i> طباعة التقرير
            </button>
            <button class="btn btn-success" id="share-whatsapp">
                <i class="fab fa-whatsapp"></i> مشاركة عبر الواتساب
            </button>
            <button class="btn btn-secondary" onclick="window.close()">
                <i class="fas fa-times"></i> إغلاق
            </button>
        </div>

        <div class="summary-cards">
            <div class="summary-card total">
                <h3>إجمالي الطلاب</h3>
                <div class="stat-value" id="total-students">0</div>
            </div>
            <div class="summary-card present">
                <h3>الحاضرين</h3>
                <div class="stat-value" id="present-count">0</div>
            </div>
            <div class="summary-card absent">
                <h3>الغائبين</h3>
                <div class="stat-value" id="absent-count">0</div>
            </div>
            <div class="summary-card">
                <h3>نسبة الحضور</h3>
                <div class="stat-value" id="attendance-rate">0%</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">قائمة الطلاب</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>اسم الطالب</th>
                            <th>الحالة</th>
                            <th>ملاحظات</th>
                        </tr>
                    </thead>
                    <tbody id="students-report-body">
                        <!-- سيتم ملؤها بالبيانات -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card no-print">
            <div class="card-header">
                <h2 class="card-title">ملخص التقرير</h2>
            </div>
            <div id="report-summary">
                <!-- سيتم ملؤها بالبيانات -->
            </div>
        </div>
    </div>

    <script>
        // تحميل البيانات من localStorage
        function loadData() {
            try {
                const students = JSON.parse(localStorage.getItem('students')) || [];
                const subjects = JSON.parse(localStorage.getItem('subjects')) || [];
                const sections = JSON.parse(localStorage.getItem('sections')) || [];
                const attendanceRecords = JSON.parse(localStorage.getItem('attendanceRecords')) || [];
                
                return { students, subjects, sections, attendanceRecords };
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                return { students: [], subjects: [], sections: [], attendanceRecords: [] };
            }
        }

        // الحصول على معاملات URL
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                date: params.get('date') || new Date().toISOString().split('T')[0],
                section: params.get('section'),
                subject: params.get('subject'),
                recordId: params.get('recordId')
            };
        }

        // توليد التقرير
        function generateReport() {
            const { students, subjects, sections, attendanceRecords } = loadData();
            const { date, section, subject, recordId } = getUrlParams();
            
            let record;
            
            if (recordId) {
                // استخدام سجل محدد
                record = attendanceRecords.find(r => r.id == recordId);
            } else {
                // البحث عن السجل الأحدث للمعايير المحددة
                record = attendanceRecords
                    .filter(r => 
                        (!date || r.date === date) &&
                        (!section || r.section === section) &&
                        (!subject || r.subject == subject)
                    )
                    .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            }
            
            if (!record) {
                document.body.innerHTML = `
                    <div class="container">
                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">لا توجد بيانات</h2>
                            </div>
                            <p>لم يتم العثور على سجلات حضور تطابق المعايير المحددة.</p>
                            <button class="btn btn-primary" onclick="window.close()">إغلاق</button>
                        </div>
                    </div>
                `;
                return;
            }
            
            // تحديث معلومات التقرير
            const sectionName = sections.find(s => s.id === record.section)?.name || 'غير معروف';
            const subjectName = subjects.find(s => s.id == record.subject)?.name || 'غير معروف';
            
            document.getElementById('report-date').textContent = `التاريخ: ${formatDate(record.date)}`;
            document.getElementById('report-info').textContent = `القسم: ${sectionName} | المادة: ${subjectName}`;
            
            // حساب الإحصائيات
            const presentStudents = record.attendance.filter(a => a.status === 'present');
            const absentStudents = record.attendance.filter(a => a.status === 'absent');
            const totalStudents = record.attendance.length;
            const attendanceRate = totalStudents > 0 ? ((presentStudents.length / totalStudents) * 100).toFixed(1) : 0;
            
            // تحديث البطاقات الإحصائية
            document.getElementById('total-students').textContent = totalStudents;
            document.getElementById('present-count').textContent = presentStudents.length;
            document.getElementById('absent-count').textContent = absentStudents.length;
            document.getElementById('attendance-rate').textContent = `${attendanceRate}%`;
            
            // ملء جدول الطلاب
            const tbody = document.getElementById('students-report-body');
            tbody.innerHTML = '';
            
            record.attendance.forEach((att, index) => {
                const student = students.find(s => s.id === att.studentId);
                if (student) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${student.name}</td>
                        <td>
                            <span class="${att.status === 'present' ? 'attendance-present' : 'attendance-absent'}">
                                ${att.status === 'present' ? 'حاضر' : 'غائب'}
                            </span>
                        </td>
                        <td>${att.notes || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });
            
            // تحديث الملخص
            updateSummary(record, presentStudents, absentStudents, sectionName, subjectName);
            
            // إعداد مشاركة الواتساب
            setupWhatsAppShare(record, presentStudents, absentStudents, sectionName, subjectName, attendanceRate);
        }

        // تحديث ملخص التقرير
        function updateSummary(record, presentStudents, absentStudents, sectionName, subjectName) {
            const summary = document.getElementById('report-summary');
            const date = formatDate(record.date);
            
            summary.innerHTML = `
                <p><strong>تفاصيل التقرير:</strong></p>
                <ul>
                    <li>التاريخ: ${date}</li>
                    <li>القسم: ${sectionName}</li>
                    <li>المادة: ${subjectName}</li>
                    <li>إجمالي عدد الطلاب: ${record.attendance.length}</li>
                    <li>عدد الحاضرين: ${presentStudents.length}</li>
                    <li>عدد الغائبين: ${absentStudents.length}</li>
                    <li>نسبة الحضور: ${((presentStudents.length / record.attendance.length) * 100).toFixed(1)}%</li>
                </ul>
                ${absentStudents.length > 0 ? `
                <p><strong>الطلاب الغائبين:</strong></p>
                <ul>
                    ${absentStudents.map(att => {
                        const student = window.appData?.students?.find(s => s.id === att.studentId);
                        return `<li>${student?.name || 'طالب غير معروف'}${att.notes ? ` - ${att.notes}` : ''}</li>`;
                    }).join('')}
                </ul>
                ` : '<p>لا يوجد طلاب غائبين.</p>'}
            `;
        }

        // إعداد مشاركة الواتساب
        function setupWhatsAppShare(record, presentStudents, absentStudents, sectionName, subjectName, attendanceRate) {
            document.getElementById('share-whatsapp').addEventListener('click', function() {
                const date = formatDate(record.date);
                const totalStudents = record.attendance.length;
                
                let message = `📊 تقرير الحضور والغياب\n\n`;
                message += `📅 التاريخ: ${date}\n`;
                message += `🏫 القسم: ${sectionName}\n`;
                message += `📚 المادة: ${subjectName}\n\n`;
                message += `📈 إحصائيات:\n`;
                message += `• إجمالي الطلاب: ${totalStudents}\n`;
                message += `• الحاضرين: ${presentStudents.length}\n`;
                message += `• الغائبين: ${absentStudents.length}\n`;
                message += `• نسبة الحضور: ${attendanceRate}%\n\n`;
                
                if (absentStudents.length > 0) {
                    message += `👥 الطلاب الغائبين:\n`;
                    absentStudents.forEach((att, index) => {
                        const student = window.appData?.students?.find(s => s.id === att.studentId);
                        if (student) {
                            message += `${index + 1}. ${student.name}`;
                            if (att.notes) {
                                message += ` (${att.notes})`;
                            }
                            message += `\n`;
                        }
                    });
                } else {
                    message += `🎉 جميع الطلاب حاضرين!`;
                }
                
                const encodedMessage = encodeURIComponent(message);
                const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
                
                window.open(whatsappUrl, '_blank');
            });
        }

        // تنسيق التاريخ
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            // تحميل appData من النافذة الأصلية إذا كانت موجودة
            if (window.opener && window.opener.appData) {
                window.appData = window.opener.appData;
            }
            generateReport();
        });
    </script>
</body>
</html>
