<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة الطلبة - الاختيار العشوائي</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">نظام متابعة الطلبة</div>
                <nav>
                    <ul>
                        <li><a href="index.html">الرئيسية</a></li>
                        <li><a href="attendance.html">الحضور والغياب</a></li>
                        <li><a href="grades.html">النقط والعلامات</a></li>
                        <li><a href="random-name.html" class="active">اختيار عشوائي</a></li>
                        <li><a href="notes.html">الملاحظات</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <main>
        <div class="container">
            <h1 class="page-title">الاختيار العشوائي للطلبة</h1>
            
            <div class="card">
                <div class="form-group">
                    <label for="classSelectRandom">اختر القسم:</label>
                    <select id="classSelectRandom">
                        <option value="">-- اختر القسم --</option>
                        <option value="جذع مشترك علوم 5">جذع مشترك علوم 5</option>
                        <option value="جذع مشترك علوم 6">جذع مشترك علوم 6</option>
                        <option value="جذع مشترك علوم 7">جذع مشترك علوم 7</option>
                        <option value="جذع مشترك علوم 8">جذع مشترك علوم 8</option>
                        <option value="الأولى علوم 5">الأولى علوم 5</option>
                        <option value="الأولى علوم 6">الأولى علوم 6</option>
                        <option value="الأولى آداب 3">الأولى آداب 3</option>
                    </select>
                </div>
                
                <button id="loadStudentsRandomBtn" class="btn-success">تحميل القسم</button>
            </div>
            
            <div class="card" id="randomNameContainer" style="display: none;">
                <h2>اختيار اسم عشوائي</h2>
                
                <div class="random-name-container">
                    <div id="randomNameDisplay" class="random-name-display">
                        اضغط على الزر لاختيار اسم عشوائي
                    </div>
                    
                    <button id="pickRandomBtn" class="btn-warning" style="font-size: 1.2rem; padding: 15px 30px;">
                        اختر اسم عشوائي
                    </button>
                    
                    <div style="margin-top: 20px;">
                        <button id="pickMultipleBtn" class="btn-success">اختيار 3 أسماء عشوائية</button>
                        <button id="resetSelectionBtn" class="btn-danger">إعادة التعيين</button>
                    </div>
                </div>
                
                <div id="selectedNamesList" style="margin-top: 30px; display: none;">
                    <h3>الأسماء المختارة:</h3>
                    <div id="selectedNamesContainer"></div>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>نظام متابعة الطلبة - مادة اللغة العربية &copy; 2023</p>
        </div>
    </footer>
    
    <script src="js/main.js"></script>
    <script src="js/random-name.js"></script>
</body>
</html>
