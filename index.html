<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | المعهد العلمي</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#1e3a8a', secondary: '#10b981' }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 via-indigo-800 to-purple-900 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-overlay filter blur-3xl opacity-30 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-overlay filter blur-3xl opacity-30 animate-pulse"></div>

    <div class="bg-white/95 backdrop-blur-md p-8 md:p-10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] w-full max-w-md text-center border border-white/20 relative z-10 mx-4">
        
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg transform -rotate-3 hover:rotate-0 transition-transform duration-300">
            <span class="text-5xl">🏛️</span>
        </div>
        
        <h1 class="text-3xl font-extrabold text-gray-800 mb-2 tracking-tight">المعهد العلمي</h1>
        <p class="text-gray-500 mb-8 font-semibold text-sm">بوابة الدخول الموحدة للطلبة والأساتذة</p>

        <form id="loginForm" class="text-right">
            <div class="mb-5 relative">
                <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">رقم الهاتف (للواتساب):</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">📞</span>
                    <input type="tel" id="userPhone" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-bold text-gray-700" placeholder="مثال: 0600000000" dir="ltr">
                </div>
            </div>
            
            <div class="mb-6 relative">
                <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">كلمة المرور:</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">🔒</span>
                    <input type="password" id="userPassword" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-bold text-gray-700" placeholder="••••••••" dir="ltr">
                </div>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl hover:from-blue-700 hover:to-indigo-700 transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 mt-2 text-lg">
                دخول للنظام 🚀
            </button>
            
            <p id="errorMsg" class="text-red-600 text-sm mt-4 hidden text-center font-bold bg-red-50 py-3 rounded-xl border border-red-100">
                ⚠️ بيانات الدخول غير صحيحة!
            </p>
        </form>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script>if('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
</body>
</html>
