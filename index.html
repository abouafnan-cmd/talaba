<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المعهد العلمي</title>
    
    <link rel="icon" type="image/png" href="icons/192.png">
    <link rel="apple-touch-icon" href="icons/192.png">
    
    <link rel="manifest" href="manifest.json">
    <script src="app.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#1e3a8a', secondary: '#10b981' }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); }
        .tab-active { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: 700; }
        .tab-inactive { color: #6b7280; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-primary p-6 text-center">
            <img src="icons/192.png" alt="شعار المعهد" class="w-16 h-16 rounded-full mx-auto mb-3 shadow-lg bg-white p-1 object-cover">
            <h1 class="text-2xl font-bold text-white">المعهد العلمي</h1>
            <p class="text-blue-200 text-sm mt-1">نظام إدارة التعليم والدراسة الأسبوعية</p>
        </div>

        <div class="flex border-b border-gray-200">
            <button onclick="window.switchTab('student')" id="tab-student" class="flex-1 py-3 text-center text-sm tab-active transition-all duration-300">طالب</button>
            <button onclick="window.switchTab('teacher')" id="tab-teacher" class="flex-1 py-3 text-center text-sm tab-inactive transition-all duration-300">أستاذ</button>
            <button onclick="window.switchTab('admin')" id="tab-admin" class="flex-1 py-3 text-center text-sm tab-inactive transition-all duration-300">الإدارة</button>
        </div>

        <div class="p-8">
            <form id="loginForm" onsubmit="window.handleLogin(event)">
                <div class="mb-5">
                    <label id="userLabel" class="block text-gray-700 text-sm font-semibold mb-2">البريد الإلكتروني (للطالب)</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="example@talaba.com" dir="ltr">
                </div>

                <div id="passwordField" class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">الرقم السري</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="••••••••" dir="ltr">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-secondary hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1">
                    تسجيل الدخول
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
