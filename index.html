<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | المعهد العلمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#1e3a8a', secondary: '#10b981' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-green-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md text-center border-t-4 border-primary relative z-10">
        <div class="w-20 h-20 bg-blue-50 text-primary rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
            <span class="text-4xl">🏛️</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">المعهد العلمي</h1>
        <p class="text-gray-500 mb-8 font-semibold">بوابة الدخول الموحدة</p>

        <form id="loginForm" class="text-right">
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-bold mb-2">رقم الهاتف (للواتساب):</label>
                <input type="tel" id="userPhone" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="مثال: 0600000000" dir="ltr">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">كلمة المرور:</label>
                <input type="password" id="userPassword" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="••••••••" dir="ltr">
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-primary text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-900 transition-colors shadow-lg mt-2">
                تسجيل الدخول
            </button>
            
            <p id="errorMsg" class="text-red-500 text-sm mt-4 hidden text-center font-bold bg-red-50 py-2 rounded-lg border border-red-100">
                ⚠️ رقم الهاتف أو كلمة المرور غير صحيحة!
            </p>
        </form>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
