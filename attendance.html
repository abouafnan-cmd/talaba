<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة الطلبة - الحضور والغياب</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">نظام متابعة الطلبة</div>
                <nav>
                    <ul>
                        <li><a href="index.html">الرئيسية</a></li>
                        <li><a href="attendance.html" class="active">الحضور والغياب</a></li>
                        <li><a href="grades.html">النقط والعلامات</a></li>
                        <li><a href="random-name.html">اختيار عشوائي</a></li>
                        <li><a href="notes.html">الملاحظات</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <main>
        <div class="container">
            <h1 class="page-title">تسجيل الحضور والغياب</h1>
            
            <div class="card">
                <div class="form-group">
                    <label for="classSelect">اختر القسم:</label>
                    <select id="classSelect">
                        <option value="">-- اختر القسم --</option>
                        <option value="جذع مشترك علوم 5">جذع مشترك علوم 5</option>
                        <option value="جذع مشترك علوم 6">جذع مشترك علوم 6</option>
                        <option value="جذع مشترك علوم 7">جذع مشترك علوم 7</option>
                        <option value="جذع مشترك علوم 8">جذع مشترك علوم 8</option>
                        <option value="الأولى علوم 5">الأولى علوم 5</option>
                        <option value="الأولى علوم 6">الأولى علوم 6</option>
                        <option value="الأولى آداب 3">الأولى آداب 3</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="dateSelect">التاريخ:</label>
                    <input type="date" id="dateSelect" value="">
                </div>
                
                <button id="loadStudentsBtn" class="btn-success">تحميل قائمة الطلبة</button>
            </div>
            
            <div class="card" id="attendanceTableContainer" style="display: none;">
                <h2>تسجيل الحضور والغياب</h2>
                <div class="table-container">
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>اسم الطالب</th>
                                <th>الحالة</th>
                                <th>ملاحظات</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                            <!-- سيتم ملؤها بالبيانات -->
                        </tbody>
                    </table>
                </div>
                <button id="saveAttendanceBtn" class="btn-success" style="margin-top: 15px;">حفظ البيانات</button>
            </div>
            
            <div class="card" id="reportsContainer" style="display: none;">
                <h2>تقارير الحضور والغياب</h2>
                <div id="reportsContent">
                    <!-- سيتم ملؤها بالتقارير -->
                </div>
                <button id="generateReportBtn" class="btn-warning">توليد تقرير</button>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>نظام متابعة الطلبة - مادة اللغة العربية &copy; 2023</p>
        </div>
    </footer>
    
    <script src="js/main.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
